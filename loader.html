<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.mol 渲染器</title>

    <!-- 内嵌 KaTeX 样式，保证离线也能显示公式 -->
    <style>
        /* KaTeX 核心样式 */
        .katex { font: normal 1.21em KaTeX_Main, Times New Roman, serif; line-height: 1.2; text-indent: 0; white-space: nowrap; }
        .katex-display { display: block; margin: 1em 0; text-align: center; }
        .katex-html { display: none; }

        /* 页面排版 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 40px; max-width: 800px; margin: 0 auto; line-height: 1.6; color: #333; background-color: #fff; }
        h1, h2, h3 { color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
        /* 输入框美化 */
        .mol-input { display: block; width: 100%; padding: 10px; margin: 15px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background: #f8f9fa; }
        /* 错误提示 */
        .error-box { background: #ffeaea; color: #d8000c; padding: 15px; border-radius: 5px; border: 1px solid #d8000c; margin-top: 20px; font-family: monospace; white-space: pre-wrap; }
    </style>

    <!-- 引入 KaTeX 渲染库 (如果离线无法加载，下面的脚本会自动处理) -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>

    <div id="content">加载中...</div>

    <script>
        // 全局变量存储
        let variables = {}; // 存储变量值
        let functions = {}; // 存储函数定义

        // 核心加载函数
        async function loadMol() {
            try {
                // 1. 获取文件路径 (比如 ?file=demo.mol)
                const urlParams = new URLSearchParams(window.location.search);
                const filePath = urlParams.get('file') || 'demo.mol'; // 默认读取 demo.mol

                // 2. 读取文件内容
                const response = await fetch(filePath);
                if (!response.ok) throw new Error(`找不到文件: ${filePath}`);
                let text = await response.text();

                // 3. 【关键修复】预处理文本，防止特殊字符导致代码崩溃
                // 将 Windows 换行符统一为 Unix 换行符，防止解析错误
                text = text.replace(/\r\n/g, '\n');

                let html = '';

                // 4. 逐行解析
                const lines = text.split('\n');
                for (let rawLine of lines) {
                    let line = rawLine.trim();

                    // 跳过空行
                    if (!line) continue;

                    // --- 指令解析 ---

                    // 1. 标题: tit
                    if (line.startsWith('tit ')) {
                        let content = line.replace('tit ', '');
                        // 简单的层级判断
                        if(content.startsWith('#')) html += `<h1>${content.replace('#', '')}</h1>`;
                        else html += `<h2>${content}</h2>`;
                    }
                    // 2. 函数定义: def f(x) = x^2 (简化模拟)
                    else if (line.startsWith('def ')) {
                        // 这里仅做标记，实际计算需要复杂的数学引擎，此处仅演示渲染
                        let defText = line.replace('def ', '');
                        html += `<p style="color:#666; font-style:italic;">[定义函数: ${defText}]</p>`;
                    }
                    // 3. 输入框: ipf
                    else if (line.startsWith('ipf ')) {
                        // ipf 变量名=默认值
                        let parts = line.replace('ipf ', '').split('=');
                        let varName = parts[0].trim();
                        let defaultVal = parts[1] ? parts[1].trim() : '';

                        // 存储变量
                        variables[varName] = defaultVal;

                        // 生成 HTML 输入框，绑定全局更新函数
                        html += `
                            <input
                                type="text"
                                class="mol-input"
                                value="${defaultVal}"
                                oninput="window.updateVar('${varName}', this.value)"
                                placeholder="输入 ${varName}"
                            />`;
                    }
                    // 4. 插入内容: ib
                    else if (line.startsWith('ib ')) {
                        let content = line.replace('ib ', '');
                        // 简单的变量替换 ${x} -> 5
                        for (let [k, v] of Object.entries(variables)) {
                            let regex = new RegExp('\\$\\{' + k + '\\}', 'g');
                            content = content.replace(regex, v);
                        }
                        // 渲染为公式
                        html += `$$${content}$$`;
                    }
                    // 5. 普通文本/公式
                    else {
                        // 如果包含 $ 符号，视为公式
                        if (line.includes('$')) {
                            html += `$$${line}$$`;
                        } else {
                            html += `<p>${line}</p>`;
                        }
                    }
                }

                // 5. 输出到页面
                document.getElementById('content').innerHTML = html;

                // 6. 渲染数学公式
                if (window.renderMathInElement) {
                    renderMathInElement(document.body, {
                        delimiters: [
                            {left: "$$", right: "$$", display: true},
                            {left: "$", right: "$", display: false}
                        ]
                    });
                }

            } catch (err) {
                // 错误处理：不再打印代码，而是打印友好的提示
                console.error(err);
                document.getElementById('content').innerHTML = `
                    <div class="error-box">
                        <strong>加载失败：</strong> ${err.message}
                        <hr/>
                        <small>请确保 .mol 文件和 loader.html 在同一文件夹内。</small>
                    </div>`;
            }
        }

        // 全局更新函数（供输入框调用）
        window.updateVar = function(name, value) {
            variables[name] = value;
            // 简单的刷新机制：重新加载
            loadMol();
        };

        // 初始化
        loadMol();
    </script>
</body>
</html>
