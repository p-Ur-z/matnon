<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>.mol 交互式渲染器 </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 40px; line-height: 1.8; max-width: 800px; margin: 0 auto; }
        #navbar { display: flex; gap: 10px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #eee; }
        #file-input { padding: 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; flex-grow: 1; }
        #load-btn { padding: 8px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #load-btn:hover { background-color: #0056b3; }
        /* 为输入框和文本域增加一些基础样式 */
        .mol-input { display: block; width: 100%; padding: 10px; margin: 10px 0 20px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .mol-textarea { height: 100px; font-family: monospace; }
    </style>
</head>
<body>
    <div id="navbar">
        <input type="text" id="file-input" value="a.mol" placeholder="请输入 .mol 文件名">
        <button id="load-btn">加载并渲染</button>
    </div>

    <div id="app">请在上方输入文件名并点击加载...</div>

    <script>
        const fileInput = document.getElementById('file-input');
        const loadBtn = document.getElementById('load-btn');
        const app = document.getElementById('app');
        let currentVariables = {}; // 存储当前页面的所有变量

        // 核心渲染逻辑
        function loadAndRender(fileName) {
            app.innerHTML = '正在加载并编译 ' + fileName + ' ...';
            
            fetch('./' + fileName)
                .then(response => {
                    if (!response.ok) throw new Error('文件未找到');
                    return response.text();
                })
                .then(molCode => {
                    // 1. 第一遍扫描：提取所有变量、函数和输入框的默认值
                    currentVariables = {};
                    const functions = {};
                    const inputs = []; // 存储需要渲染的输入框信息

                    molCode.split('\n').forEach(line => {
                        line = line.trim();
                        if (!line) return;

                        if (line.startsWith('tit ')) {
                            document.title = line.substring(4).trim();
                        }
                        else if (line.startsWith('la-')) {
                            const parts = line.split(' ');
                            currentVariables[parts[0]] = parts.slice(1).join(' ');
                        } 
                        else if (line.startsWith('n-')) {
                            const parts = line.split(' ');
                            currentVariables[parts[0]] = parts[1];
                        }
                        else if (line.startsWith('m-')) {
                            const parts = line.split(' ');
                            const num = parseInt(parts[1]);
                            const mod = parseInt(parts[2]);
                            currentVariables[parts[0]] = num % mod;
                        }
                        else if (line.startsWith('def ')) {
                            const defMatch = line.match(/def\s+(\S+)\s+（(.+?)）\s+\{(.+)\}/);
                            if (defMatch) {
                                functions[defMatch[1].trim()] = { 
                                    paramName: defMatch[2].trim(), 
                                    template: defMatch[3].trim() 
                                };
                            }
                        }
                        // 解析 ipf 交互式输入框
                        else if (line.startsWith('ipf ')) {
                            // 格式：变量名=ipf 函数名（灰色默认内容）
                            const ipfMatch = line.match(/(\S+)=ipf\s+(\S+)\s*（(.*)）/);
                            if (ipfMatch) {
                                inputs.push({
                                    varName: ipfMatch[1].trim(),
                                    funcName: ipfMatch[2].trim(),
                                    placeholder: ipfMatch[3].trim()
                                });
                            }
                        }
                    });

                    // 2. 渲染页面内容（包括输入框和 ib 输出）
                    function renderPage() {
                        app.innerHTML = ''; 
                        
                        // 渲染输入框
                        inputs.forEach(input => {
                            const varType = input.varName.startsWith('la-') ? 'textarea' : 'input';
                            const currentValue = currentVariables[input.varName] || '';
                            
                            if (varType === 'input') {
                                const inputEl = document.createElement('input');
                                inputEl.type = 'number';
                                inputEl.className = 'mol-input';
                                inputEl.value = currentValue;
                                inputEl.placeholder = input.placeholder;
                                // 监听输入，实时更新变量并重新渲染
                                inputEl.addEventListener('input', (e) => {
                                    currentVariables[input.varName] = e.target.value;
                                    renderPage();
                                });
                                app.appendChild(inputEl);
                            } else {
                                const textareaEl = document.createElement('textarea');
                                textareaEl.className = 'mol-input mol-textarea';
                                textareaEl.value = currentValue;
                                textareaEl.placeholder = input.placeholder;
                                textareaEl.addEventListener('input', (e) => {
                                    currentVariables[input.varName] = e.target.value;
                                    renderPage();
                                });
                                app.appendChild(textareaEl);
                            }
                        });

                        // 扫描原始代码，渲染 ib 和普通文本
                        molCode.split('\n').forEach(line => {
                            line = line.trim();
                            if (!line || line.startsWith('tit ') || line.startsWith('def ') || line.startsWith('ipf ')) return;

                            if (line.startsWith('la-') || line.startsWith('n-') || line.startsWith('m-')) {
                                // 变量定义行不在页面显示内容，跳过
                            }
                            else if (line.startsWith('ib')) {
                                const ibMatch = line.match(/ib\s*\((.+)\)/);
                                if (ibMatch) {
                                    const content = ibMatch[1].trim();
                                    const funcCallMatch = content.match(/(\S+):(.+)/);
                                    
                                    if (funcCallMatch && functions[funcCallMatch[1]]) {
                                        const calledFuncName = funcCallMatch[1].trim();
                                        const inputValue = funcCallMatch[2].trim();
                                        const funcObj = functions[calledFuncName];
                                        const renderedFormula = funcObj.template.replace(new RegExp(`\\b${funcObj.paramName}\\b`, 'g'), inputValue);
                                        app.innerHTML += `<p><span class="latex">${renderedFormula}</span></p>`;
                                    } else {
                                        const varValue = currentVariables[content];
                                        if (varValue !== undefined) {
                                            app.innerHTML += `<p><span class="latex">${varValue}</span></p>`;
                                        }
                                    }
                                }
                            } else {
                                app.innerHTML += `<p>${line}</p>`;
                            }
                        });

                        // 重新唤醒 KaTeX 渲染
                        if (window.renderMathInElement) {
                            renderMathInElement(app, {
                                delimiters: [{left: '$', right: '$', display: false}],
                                throwOnError : false
                            });
                        }
                    }

                    renderPage(); // 初次渲染
                })
                .catch(err => {
                    app.innerHTML = '<p style="color:red">加载 ' + fileName + ' 失败！请检查文件名是否正确。</p>';
                    console.error(err);
                });
        }

        loadBtn.addEventListener('click', () => {
            let fileName = fileInput.value.trim();
            if (fileName && !fileName.endsWith('.mol')) {
                fileName += '.mol';
                fileInput.value = fileName;
            }
            if (fileName) loadAndRender(fileName);
        });

        fileInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loadBtn.click();
        });

        loadAndRender('a.mol');
    </script>
</body>
</html>
