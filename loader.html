<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.mol 渲染器</title>

    <!-- 1. 内嵌 KaTeX 样式 (防网络加载失败) -->
    <style>
        /* KaTeX 样式 */
        .katex { font: normal 1.21em KaTeX_Main, Times New Roman, serif; line-height: 1.2; text-indent: 0; white-space: nowrap; }
        .katex-display { display: block; margin: 1em 0; text-align: center; }
        .katex-html { display: none; }

        /* 页面基础样式 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 40px; max-width: 800px; margin: 0 auto; line-height: 1.6; color: #333; background-color: #fff; }
        input[type="text"] { display: block; width: 100%; padding: 10px; margin: 15px 0; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        h1 { border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .error-box { color: red; border: 1px solid red; padding: 10px; margin-top: 20px; white-space: pre-wrap; }
    </style>

    <!-- 2. 内嵌 KaTeX 库 (防网络加载失败) -->
    <!-- 这里使用了 unpkg 的链接，如果完全离线，请下载 katex.min.js 放在同目录并修改 src -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>

    <!-- 3. 数据容器 (通过 DOM 属性存储，绝对安全，不会受内容换行影响) -->
    <!-- 请将你的 .mol 内容粘贴在下面的 data-content 中 -->
    <div id="mol-source" style="display:none;" data-content="
tit 质点运动学核心公式
def f(x) x^2 + 2x + 1
def g(t) \frac{1}{2}gt^2
ib 在经典力学中，位移与时间的关系通常表示为：
ipf x = 10
ib 当变量 $x = \text{ipf}$ 时，函数 $f(x)$ 的值为：
ib $$ f(\text{ipf}) = \text{def f(ipf)} $$
ib 自由落体公式： $$ s = \text{def g(t)} $$
"></div>

    <div id="content">正在加载...</div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // --- 核心修复：安全读取数据 ---
            // 使用 DOM API 读取，完美处理换行和引号
            const sourceDiv = document.getElementById('mol-source');
            const molText = sourceDiv.getAttribute('data-content');

            // --- 核心逻辑：解析器 ---
            const variables = {};
            const functions = {};

            // 初始化渲染函数
            function render() {
                let html = '';

                // 按行处理
                const lines = molText.split('\n');

                lines.forEach(line => {
                    line = line.trim();
                    if (!line) return;

                    try {
                        // 1. 处理标题 tit
                        if (line.startsWith('tit ')) {
                            const text = line.substring(4).trim();
                            html += `<h1>${text}</h1>`;
                        }
                        // 2. 处理函数定义 def
                        else if (line.startsWith('def ')) {
                            // 格式: def name(args) body
                            const match = line.match(/def\s+([a-zA-Z_]\w*)\(([^)]*)\)\s*(.*)/);
                            if (match) {
                                const name = match[1];
                                const args = match[2].split(',').map(s => s.trim());
                                const body = match[3].trim();
                                functions[name] = { args, body };
                            }
                        }
                        // 3. 处理输入框 ipf
                        else if (line.startsWith('ipf ')) {
                            // 格式: ipf var = default
                            const parts = line.substring(4).split('=');
                            const varName = parts[0].trim();
                            const defaultVal = parts[1] ? parts[1].trim() : '';

                            // 初始化变量
                            if (!(varName in variables)) {
                                variables[varName] = defaultVal;
                            }

                            // 生成输入框 HTML，并绑定 oninput 事件
                            html += `<input type="text" value="${variables[varName]}" oninput="updateVar('${varName}', this.value)">`;
                        }
                        // 4. 处理插入 ib
                        else if (line.startsWith('ib ')) {
                            let content = line.substring(3);

                            // 替换变量 ${var}
                            content = content.replace(/\$\{([^}]+)\}/g, (match, key) => variables[key.trim()] || '');

                            // 替换函数调用 f(x) -> 计算结果
                            // 简单的正则替换，实际可能需要递归解析
                            content = content.replace(/([a-zA-Z_]\w*)\(([^)]*)\)/g, (match, fName, fArgs) => {
                                if (functions[fName]) {
                                    // 这里只是简单的字符串替换演示，复杂的数学计算需要 mathjs
                                    // 为了演示，我们直接返回 LaTeX 格式或者简单计算
                                    return `\\text{计算: }${fName}(${fArgs})`;
                                }
                                return match;
                            });

                            html += `<p>${content}</p>`;
                        }
                        // 5. 普通文本
                        else {
                            html += `<p>${line}</p>`;
                        }
                    } catch (e) {
                        console.error("解析行出错:", line, e);
                    }
                });

                document.getElementById('content').innerHTML = html;

                // 尝试渲染公式
                if (window.renderMathInElement) {
                    renderMathInElement(document.getElementById('content'), {
                        delimiters: [
                            {left: "$$", right: "$$", display: true},
                            {left: "$", right: "$", display: false},
                            {left: "\\(", right: "\\)", display: false},
                            {left: "\\[", right: "\\]", display: true}
                        ]
                    });
                }
            }

            // --- 暴露给全局，供输入框调用 ---
            window.updateVar = function(name, value) {
                variables[name] = value;
                render(); // 重新渲染
            };

            // 首次渲染
            render();
        });
    </script>
</body>
</html>
