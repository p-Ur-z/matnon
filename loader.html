<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.mol 预览</title>

    <!-- 核心修复：内嵌 KaTeX 样式，确保离线也能完美渲染公式，不再显示为纯文本 -->
    <style>
        /* KaTeX 核心样式 */
        .katex { font: normal 1.21em KaTeX_Main, Times New Roman, serif; line-height: 1.2; text-indent: 0; white-space: nowrap; }
        .katex-display { display: block; margin: 1em 0; text-align: center; }
        /* 基础页面排版 */
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; padding: 40px; max-width: 800px; margin: 0 auto; background: #fff; color: #333; line-height: 1.8; }
        h1, h2, h3 { color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        /* ipf 交互输入框样式 */
        .mol-input-group { margin: 15px 0; padding: 10px; background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 5px; }
        .mol-input-label { font-weight: bold; margin-right: 10px; font-family: monospace; }
        .mol-input-field { padding: 5px; border: 1px solid #ccc; border-radius: 3px; font-family: monospace; }
    </style>

    <!-- 引入 KaTeX 渲染引擎 (JS) -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>

    <!-- 内容将在这里被注入 -->
    <div id="content"></div>

    <script>
        // 模拟从 mol.js 传来的数据对象
        // 在实际使用中，mol.js 会修改这里的 window.molData
        const molData = window.molData || {
            title: "未命名文档",
            blocks: [] // 格式: { type: 'text'|'formula'|'input', value: '...', id: '...' }
        };

        // 存储变量和函数的对象
        const scope = {};

        // 初始化函数
        function init() {
            document.title = molData.title;
            const container = document.getElementById('content');

            molData.blocks.forEach(block => {
                const div = document.createElement('div');

                if (block.type === 'title') {
                    div.innerHTML = `<h1>${block.value}</h1>`;
                }
                else if (block.type === 'text') {
                    div.innerHTML = `<p>${block.value}</p>`;
                }
                else if (block.type === 'formula') {
                    div.className = 'formula-block';
                    div.dataset.latex = block.value; // 存储原始公式用于后续更新
                    // 初始渲染
                    renderLatex(div, block.value);
                }
                else if (block.type === 'input') {
                    // 创建交互式输入框结构
                    div.className = 'mol-input-group';
                    div.innerHTML = `
                        <span class="mol-input-label">${block.label || block.id}:</span>
                        <input type="text" class="mol-input-field" id="input-${block.id}" value="${block.value}">
                    `;

                    // 绑定输入事件
                    const inputEl = div.querySelector('input');
                    inputEl.addEventListener('input', function() {
                        // 更新内存中的值
                        scope[block.id] = this.value;
                        // 重新渲染所有公式
                        updateAllFormulas();
                    });

                    // 初始化变量值
                    scope[block.id] = block.value;
                }

                container.appendChild(div);
            });

            // 首次渲染
            updateAllFormulas();
        }

        // 替换字符串中的变量 (简单实现)
        function processString(str) {
            let result = str;
            // 简单的变量替换，例如 x 替换为 5
            // 注意：这是一个极简实现，复杂的数学表达式解析需要更强大的库
            Object.keys(scope).forEach(key => {
                const regex = new RegExp('\\b' + key + '\\b', 'g');
                result = result.replace(regex, scope[key]);
            });
            return result;
        }

        function renderLatex(element, latex) {
            try {
                katex.render(latex, element, {
                    throwOnError: false,
                    displayMode: latex.includes('\\int') || latex.includes('\\sum') || latex.includes('frac')
                });
            } catch (e) {
                element.textContent = "渲染错误: " + latex;
            }
        }

        function updateAllFormulas() {
            const formulas = document.querySelectorAll('.formula-block');
            formulas.forEach(div => {
                let rawLatex = div.dataset.latex;
                let processedLatex = processString(rawLatex);
                renderLatex(div, processedLatex);
            });
        }

        // 启动
        window.onload = init;
    </script>
</body>
</html>
