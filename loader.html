<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.mol 渲染器</title>

    <!-- 1. 内嵌 KaTeX 样式 (防网络加载失败) -->
    <style>
        /* KaTeX 样式 */
        .katex { font: normal 1.21em KaTeX_Main, Times New Roman, serif; line-height: 1.2; text-indent: 0; white-space: nowrap; }
        .katex-display { display: block; margin: 1em 0; text-align: center; }
        .katex-html { display: none; }

        /* 页面基础样式 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 40px; max-width: 800px; margin: 0 auto; line-height: 1.6; color: #333; background-color: #fff; }
        h1, h2, h3 { color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
        hr { border: 0; border-top: 1px solid #eee; margin: 2em 0; }

        /* 输入框样式 - 关键修复 */
        .mol-input {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            font-size: 16px;
            border: 2px solid #3498db; /* 明显的边框 */
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #f8f9fa;
            transition: border-color 0.2s;
        }
        .mol-input:focus {
            outline: none;
            border-color: #2980b9;
            background-color: #fff;
            box-shadow: 0 0 8px rgba(41, 128, 185, 0.2);
        }

        /* 错误提示 */
        .error-log { color: red; background: #ffeaea; padding: 10px; border-radius: 4px; font-family: monospace; margin-top: 20px; }
    </style>

    <!-- 2. 内嵌 KaTeX 脚本 (防网络加载失败) -->
    <!-- 这里使用了极简的 KaTeX 渲染逻辑 -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head>
<body>

    <!-- 内容将渲染在这里 -->
    <div id="content"></div>

    <script>
        // ==========================================
        // 核心配置：在这里修改你的 .mol 文件路径
        // ==========================================
        const MOL_FILE_PATH = 'test.mol';

        // 全局变量存储
        let variables = { x: 5, y: 10 }; // 默认变量
        let functions = {}; // 默认函数

        // 主加载函数
        async function loadMol() {
            try {
                const response = await fetch(MOL_FILE_PATH + '?t=' + new Date().getTime()); // 加时间戳防止缓存
                if (!response.ok) throw new Error(`无法加载文件: ${response.status}`);
                const text = await response.text();
                parseAndRender(text);
            } catch (err) {
                document.getElementById('content').innerHTML = `<div class="error-log">加载失败: ${err.message}<br>请确保 test.mol 和 loader.html 在同一文件夹。</div>`;
            }
        }

        // 解析与渲染逻辑
        function parseAndRender(text) {
            let html = '';
            const lines = text.split('\n');

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                try {
                    // --- 1. 处理指令 ---
                    if (line.startsWith('tit ')) {
                        const content = line.substring(4).trim();
                        html += `<h1>${content}</h1>`;
                    }
                    else if (line.startsWith('def ')) {
                        // 解析 def f(x) = x+1
                        const match = line.match(/def\s+([a-zA-Z0-9_]+)\(([^)]+)\)\s*=\s*(.+)/);
                        if (match) {
                            const fname = match[1];
                            const argName = match[2];
                            const body = match[3];
                            // 动态创建函数
                            functions[fname] = new Function(argName, `
                                with(variables) {
                                    return (${body});
                                }
                            `);
                        }
                    }
                    else if (line.startsWith('ipf ')) {
                        // 解析 ipf x=5
                        const parts = line.substring(4).trim().split('=');
                        const varName = parts[0].trim();
                        const defaultVal = parts[1] ? parts[1].trim() : '0';

                        // 生成输入框 HTML，并绑定 oninput 事件
                        html += `<input type="text"
                                    class="mol-input"
                                    value="${defaultVal}"
                                    oninput="updateVar('${varName}', this.value)">`;

                        // 初始化变量
                        variables[varName] = parseFloat(defaultVal) || 0;
                    }
                    else if (line.startsWith('ib ')) {
                        // 内容插入 ib {content}
                        let content = line.substring(3).trim();
                        // 替换变量
                        for (let v in variables) {
                            const regex = new RegExp(`\\$${v}\\b`, 'g');
                            content = content.replace(regex, variables[v]);
                        }
                        // 替换函数调用
                        for (let f in functions) {
                            const regex = new RegExp(`${f}\\(([^)]+)\\)`, 'g');
                            content = content.replace(regex, (match, arg) => {
                                try {
                                    // 尝试计算函数
                                    return functions[f](eval(arg));
                                } catch(e) { return match; }
                            });
                        }
                        html += `<p>${content}</p>`;
                    }
                    else if (line.startsWith('hr')) {
                        html += '<hr>';
                    }
                    else {
                        // 普通文本/公式
                        html += `<p>${line}</p>`;
                    }
                } catch (e) {
                    console.error('解析行出错:', line, e);
                }
            }

            // 更新 DOM
            document.getElementById('content').innerHTML = html;

            // 渲染数学公式
            if (window.renderMathInElement) {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: "$$", right: "$$", display: true},
                        {left: "$", right: "$", display: false}
                    ]
                });
            }
        }

        // 暴露给全局，供输入框调用
        window.updateVar = function(name, value) {
            // 更新变量值
            variables[name] = parseFloat(value) || 0;
            console.log(`变量 ${name} 更新为:`, variables[name]);
            // 重新加载并渲染
            loadMol();
        };

        // 初始化
        loadMol();

    </script>
</body>
</html>
