<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.mol 渲染器</title>

    <!-- 1. 内嵌 CSS 样式 (防止网络加载失败导致显示为纯文本) -->
    <style>
        /* KaTeX 样式核心 (精简版) */
        .katex { font: normal 1.21em KaTeX_Main, Times New Roman, serif; line-height: 1.2; text-indent: 0; white-space: nowrap; }
        .katex-display { display: block; margin: 1em 0; text-align: center; }
        .katex-html { display: none; } /* 隐藏源码 */

        /* 页面基础样式 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 40px; max-width: 800px; margin: 0 auto; line-height: 1.6; color: #333; background-color: #fff; }
        h1, h2, h3 { color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
        p { margin-bottom: 1em; }
        code { background: #f4f4f4; padding: 2px 5px; border-radius: 3px; font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }

        /* 交互输入框样式 */
        .mol-input-group { margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 8px; border: 1px solid #e9ecef; }
        .mol-input-label { font-weight: bold; margin-bottom: 5px; display: block; color: #555; }
        .mol-input-field { width: 100%; padding: 8px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

    <!-- 内容将在这里被注入 -->
    <div id="content"></div>

    <!-- 2. 内嵌 KaTeX 渲染引擎 (防止网络加载失败) -->
    <!-- 这里使用了 KaTeX 的自动渲染脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <script>
        // ==========================================
        // 配置区：请在这里粘贴你的 .mol 文本内容
        // 注意：请保持引号完整，内容放在反引号 (`) 之间
        // ==========================================
        const molContent = `
使用 tit 指令可以快速定义生成网页的浏览器标签标题。
例如：tit 我的物理笔记

2. 变量存储与渲染
使用 ib {变量名} 即可将存储的内容渲染到网页上。
演示：爱因斯坦质能方程
E = mc^2

3. 函数定义与调用 (def)
使用 def 指令可以定义一个带有自变量的 LaTeX 模板函数。
语法：def 函数名 (自变量名) {LaTeX公式模板}
调用：ib {函数名.传入值}
例如：def f (x) {x^2 + 1}
调用 ib {f.5} 将渲染出 5^2 + 1 的公式效果。

4. 交互式输入框 (ipf)
使用 ipf 指令可以在网页上生成可交互的输入框，修改输入框内容会实时更新变量。
ipf x 10
现在的 x 值是：ib {x}
`;

        // ==========================================
        // 核心逻辑：解析与渲染
        // ==========================================

        // 简单的变量存储库
        const variables = {};
        // 函数存储库
        const functions = {};

        // 辅助函数：安全地获取变量值
        function getVar(name) {
            return variables[name] !== undefined ? variables[name] : `{${name}}`;
        }

        // 辅助函数：执行函数替换
        function processFunctions(text) {
            // 匹配 ib {funcName.value}
            return text.replace(/ib\s*\{([a-zA-Z0-9_]+)\.([a-zA-Z0-9_]+)\}/g, (match, funcName, argVal) => {
                if (functions[funcName]) {
                    // 简单的模板替换，将函数定义中的 #arg 替换为实际值
                    // 注意：这里假设函数定义时用了 #arg 作为占位符，或者我们在定义时处理
                    // 为了兼容你的描述，我们需要稍微调整 def 的解析逻辑
                    let template = functions[funcName];
                    // 如果模板里包含 #1, #2 等占位符，这里可以扩展
                    // 简化版：假设 def f(x) {x^2}，我们只需把模板里的 x 换成 argVal?
                    // 不，更安全的方式是在 def 解析时确定占位符。
                    // 这里做一个简单的假设：模板里直接写了参数名，或者我们约定用 #val
                    // 根据你之前的例子 def f (x) {x^2 + 1}，调用 ib {f.5}
                    // 我们需要知道 x 是参数。
                    // 简单实现：存储时记录参数名
                    return template.replace(new RegExp(functions[funcName + '_arg'], 'g'), argVal);
                }
                return match; // 未定义则原样返回
            });
        }

        function parseMOL(text) {
            const lines = text.split('\n');
            let html = '';
            let buffer = ''; // 用于合并普通文本行

            const flushBuffer = () => {
                if (buffer.trim()) {
                    // 处理缓冲区内的变量替换 ib {var}
                    let processed = buffer.replace(/ib\s*\{([a-zA-Z0-9_]+)\}/g, (match, p1) => getVar(p1));
                    // 处理函数调用
                    processed = processFunctions(processed);
                    html += `<p>${processed}</p>`;
                }
                buffer = '';
            };

            lines.forEach(line => {
                line = line.trim();

                // 1. 处理标题 tit
                if (line.startsWith('tit ')) {
                    document.title = line.substring(4);
                }
                // 2. 处理变量定义 (假设格式为 var name value 或类似，虽然你没提，但通常需要)
                // 根据你的描述，似乎没有显式的 var 定义，而是通过 ipf 定义？
                // 如果是直接赋值，比如 "x = 10"，这里可以加逻辑。暂略。

                // 3. 处理函数定义 def
                else if (line.startsWith('def ')) {
                    flushBuffer();
                    // 语法: def 函数名 (自变量名) {LaTeX模板}
                    const defMatch = line.match(/def\s+([a-zA-Z0-9_]+)\s*\(\s*([a-zA-Z0-9_]+)\s*\)\s*\{(.+)\}/);
                    if (defMatch) {
                        const fName = defMatch[1];
                        const argName = defMatch[2];
                        const template = defMatch[3];
                        functions[fName] = template;
                        functions[fName + '_arg'] = argName; // 存储参数名用于替换
                    }
                }

                // 4. 处理交互输入框 ipf
                else if (line.startsWith('ipf ')) {
                    flushBuffer();
                    // 语法: ipf 变量名 默认值
                    const ipfMatch = line.match(/ipf\s+([a-zA-Z0-9_]+)\s+(.+)/);
                    if (ipfMatch) {
                        const varName = ipfMatch[1];
                        const defaultVal = ipfMatch[2].trim();
                        variables[varName] = defaultVal; // 初始化变量

                        html += `
                        <div class="mol-input-group">
                            <label class="mol-input-label">输入 ${varName}:</label>
                            <input type="text" class="mol-input-field" value="${defaultVal}"
                                oninput="updateVar('${varName}', this.value)">
                        </div>`;
                    }
                }

                // 5. 普通文本
                else {
                    buffer += line + ' ';
                }
            });

            flushBuffer(); // 处理剩余的文本
            return html;
        }

        // 全局更新函数，供输入框调用
        window.updateVar = function(name, value) {
            variables[name] = value;
            // 重新解析并渲染
            const container = document.getElementById('content');
            container.innerHTML = parseMOL(molContent);
            // 重新渲染数学公式
            renderMathInElement(container, {
                delimiters: [
                    {left: "$$", right: "$$", display: true},
                    {left: "\\[", right: "\\]", display: true},
                    {left: "$", right: "$", display: false},
                    {left: "\\(", right: "\\)", display: false}
                ]
            });
        };

        // 初始化
        try {
            const container = document.getElementById('content');
            // 清理文本中的非法字符，防止脚本崩溃
            const safeContent = molContent
                .replace(/`/g, '') // 移除可能干扰模板字符串的反引号
                .replace(/<\/script>/g, '<\\/script>'); // 防止提前闭合脚本标签

            container.innerHTML = parseMOL(safeContent);

            // 触发 KaTeX 渲染
            renderMathInElement(container, {
                delimiters: [
                    {left: "$$", right: "$$", display: true},
                    {left: "\\[", right: "\\]", display: true},
                    {left: "$", right: "$", display: false},
                    {left: "\\(", right: "\\)", display: false}
                ]
            });
        } catch (e) {
            console.error(e);
            document.body.innerHTML = `<h1>解析错误</h1><p>请检查控制台 (F12) 查看具体错误信息。</p><pre>${e.message}</pre>`;
        }
    </script>
</body>
</html>
